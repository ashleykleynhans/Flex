{% extends "base.html" %}

{% block title %} &ndash; {{ _('Categories') }}{% endblock %}

{% block content %}
<div class="list-page">
  <h1>{{ _('Categories') }}</h1>
  <ul class="list">
    {% for category, articles in categories|sort %}
    <li>
      <a href="{{ SITEURL }}/{{ category.url }}">{{ category }}</a> ({{ articles|count }})
    </li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
