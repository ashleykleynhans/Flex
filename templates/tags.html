{% extends "base.html" %}

{% block title %} &ndash; {{ _('Tags') }}{% endblock %}

{% block content %}
<div class="list-page">
  <h1>{{ _('Tags') }}</h1>
  <ul class="list">
    {%- for tag, articles in tags|sort %}
      <li><a href="{{ SITEURL }}/{{ tag.url }}">{{ tag }}</a> ({{ articles|count }})</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
